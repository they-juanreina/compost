name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned per #210; Dependabot watches .github/workflows for upgrades.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # No `version:` here — pnpm/action-setup reads the pinned version from
      # package.json's `packageManager` field. Specifying both errors with
      # ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build first so workspace packages emit their .d.ts (cli's typecheck
      # imports compost-provenance, which only has declarations after build).
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # plugin/dist is the committed install payload (Claude Code copies the
      # plugin folder without building). `pnpm build` above just regenerated it
      # — if it differs from what's committed, the tree is dirty and someone
      # forgot to commit the rebuild. Fail with the diff so it's obvious.
      - name: plugin/dist is in sync with source
        run: |
          if ! git diff --quiet -- plugin/dist; then
            echo "::error::plugin/dist is stale. Run 'pnpm --filter compost-plugin build' and commit." >&2
            git --no-pager diff -- plugin/dist
            exit 1
          fi

  python:
    name: python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install transcriber (base + frames + legacy extras + dev tools)
        working-directory: transcriber
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[frames,legacy]'
          pip install ruff pytest httpx jsonschema reportlab

      - name: Ruff
        working-directory: transcriber
        run: ruff check .

      - name: Pytest
        working-directory: transcriber
        run: pytest -q
