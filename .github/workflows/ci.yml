name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm/action-setup reads the pinned version from
      # package.json's `packageManager` field. Specifying both errors with
      # ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  python:
    name: python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install transcriber (base + frames extra + dev tools)
        working-directory: transcriber
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[frames]'
          pip install ruff pytest httpx

      - name: Ruff
        working-directory: transcriber
        run: ruff check .

      - name: Pytest
        working-directory: transcriber
        run: pytest -q
