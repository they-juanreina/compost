name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # OIDC for npm Trusted Publishing (#208). With trusted publishers configured
  # per-package on npm, GitHub Actions exchanges an OIDC token for npm publish
  # credentials at runtime — no long-lived NPM_TOKEN secret in the repo. The
  # `--provenance` flag attaches a verifiable provenance attestation to each
  # tarball ("Built by GitHub Actions in <repo>@<sha>"), discoverable via
  # `npm audit signatures`.
  id-token: write

jobs:
  release:
    name: build + publish v0.1 artifacts
    runs-on: ubuntu-latest
    steps:
      # Third-party Actions are pinned to commit SHAs (not floating tags) so an
      # upstream maintainer compromise of a `vN` tag can't repoint a step inside
      # this job — which holds NPM_TOKEN. Same posture for first-party
      # `actions/*` (lower risk, same hygiene). Dependabot watches .github/workflows
      # and PRs upgrades — see .github/dependabot.yml. (#210)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history for release notes

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          # registry-url is intentionally NOT set: it tells setup-node to write
          # ~/.npmrc with `${NODE_AUTH_TOKEN}` auth, which makes npm prefer the
          # (non-existent) token over the OIDC handshake for Trusted Publishing
          # (#208). pnpm publish picks npmjs.org by default; OIDC handles auth.

      - name: Install + build + test
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm typecheck
          pnpm test

      - name: Verify the Cowork manifest is in sync with the Claude Code manifest
        run: |
          python3 - <<'PY'
          import json, sys
          cc = json.load(open("plugin/.claude-plugin/plugin.json"))
          cw = json.load(open("plugin/.cowork/manifest.json"))
          expected = {
            "name": cc["name"], "version": cc["version"], "description": cc["description"],
            "registry": "cowork", "commands": cc.get("commands"),
            "skills": cc.get("skills", []), "mcp": list(cc.get("mcpServers", {}).keys()),
            "derived_from": ".claude-plugin/plugin.json",
          }
          if cw != expected:
            print("Cowork manifest is stale; regenerate it from plugin.json", file=sys.stderr)
            sys.exit(1)
          print("cowork manifest in sync")
          PY

      - name: Auto-generate release notes from closed issues since last tag
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          echo "Release ${GITHUB_REF_NAME}" > NOTES.md
          echo "" >> NOTES.md
          if [ -n "$PREV" ]; then
            git log --pretty='- %s' "${PREV}..${GITHUB_REF_NAME}" >> NOTES.md
          else
            git log --pretty='- %s' >> NOTES.md
          fi

      # Publish the workspace packages cli depends on FIRST — otherwise
      # @they-juanreina/compost-cli's `workspace:*` deps resolve to versions
      # that don't exist on the registry and `npm i -g …compost-cli` 404s.
      # provenance/retrieval/evals have no inter-deps, so order among them
      # doesn't matter; cli must come last.
      # Prerelease tags (anything containing `-`, e.g. `v0.1.1-rc.1`) publish
      # under the `rc` npm dist-tag so they don't claim `latest`. Stable tags
      # roll `latest` forward as usual. (#209)
      - name: Compute npm dist-tag from ref name
        id: npmtag
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      # Guard the #206 shipping surface: cli's `prepack` (copy-transcriber.mjs)
      # bundles the Python transcriber source into the tarball so global installs
      # transcribe natively. Pack a real tarball and assert the source shipped —
      # and that no compiled bytecode / the multi-GB .venv leaked in — so a broken
      # bundle fails the release instead of publishing silently.
      - name: Verify cli tarball bundles the transcriber source (#206)
        working-directory: cli
        run: |
          pnpm pack
          TGZ=$(ls they-juanreina-compost-cli-*.tgz)
          echo "Packed $TGZ"
          tar -tzf "$TGZ" | grep -q 'package/transcriber/app/transcribe_cli.py' \
            || { echo "::error::transcriber source missing from cli tarball (#206)"; exit 1; }
          tar -tzf "$TGZ" | grep -q 'package/transcriber/pyproject.toml' \
            || { echo "::error::transcriber pyproject.toml missing from cli tarball"; exit 1; }
          if tar -tzf "$TGZ" | grep -Eq 'package/transcriber/(\.venv|tests/|.*__pycache__|.*egg-info|.*\.pyc)'; then
            echo "::error::cli tarball contains transcriber cruft (.venv/__pycache__/tests/egg-info/.pyc)"
            exit 1
          fi
          rm -f "$TGZ"

      - name: Publish @they-juanreina/compost-provenance to npm
        working-directory: provenance
        run: pnpm publish --no-git-checks --access public --provenance --tag ${{ steps.npmtag.outputs.tag }}

      - name: Publish @they-juanreina/compost-retrieval to npm
        working-directory: retrieval
        run: pnpm publish --no-git-checks --access public --provenance --tag ${{ steps.npmtag.outputs.tag }}

      - name: Publish @they-juanreina/compost-evals to npm
        working-directory: evals
        run: pnpm publish --no-git-checks --access public --provenance --tag ${{ steps.npmtag.outputs.tag }}

      - name: Publish @they-juanreina/compost-cli to npm
        working-directory: cli
        run: pnpm publish --no-git-checks --access public --provenance --tag ${{ steps.npmtag.outputs.tag }}

      - name: GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: NOTES.md
          generate_release_notes: true
          # Auto-flag `v*-rc.N` / `v*-beta` / `v*-alpha` tags as prereleases
          # so they don't appear as "latest" on the releases page (#22).
          prerelease: ${{ contains(github.ref_name, '-') }}
