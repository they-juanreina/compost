# Opt-in / scheduled ASR smoke (#185). NOT a PR gate: the base `python` CI job
# installs [frames,legacy] only, so the heavy ASR path (Parakeet/WhisperX +
# pyannote) is validated here on a tiny fixture. Runs on manual dispatch and a
# weekly schedule; skips cleanly when the HuggingFace token secret is absent.
name: asr-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  asr-smoke:
    name: native ASR smoke (Parakeet + pyannote)
    # Apple-Silicon runner: Parakeet runs natively on Metal (matches the prod path).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install transcriber with ASR extras
        working-directory: transcriber
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[asr]'

      - name: Run ASR smoke
        working-directory: transcriber
        env:
          # pyannote diarization needs a HuggingFace token. Stored as a repo
          # secret; if absent (forks), skip rather than fail — this job is opt-in.
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          if [ -z "${HUGGINGFACE_TOKEN}" ]; then
            echo "::notice::HUGGINGFACE_TOKEN not set — skipping ASR smoke (diarization needs it)."
            exit 0
          fi
          python scripts/asr_smoke.py --engine parakeet
